name = "giveready"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Serve static files from public/ (widget, demo page, etc.)
# Static assets are served first; unmatched paths fall through to the Worker
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "none"

[vars]
ENVIRONMENT = "production"
ADMIN_TOKEN = "giveready-admin-2026"

[[d1_databases]]
binding = "DB"
database_name = "giveready-db"
database_id = "79ee57e3-489f-4f56-abb0-06cedf5cdff4"

# Custom domain
[[routes]]
pattern = "giveready.org/*"
zone_id = "5ef15f7adb081b0117f2832bcfe44e0d"

[[routes]]
pattern = "www.giveready.org/*"
zone_id = "5ef15f7adb081b0117f2832bcfe44e0d"
